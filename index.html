<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Flashcards</title>

<style>
:root{
  --bg:#0c0c0e;
  --card:#18181b;
  --text:#ffffff;
  --muted:#8e8e93;
  --radius:22px;
  --transition:.35s cubic-bezier(.4,0,.2,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* SCREENS */

.screen{
  position:absolute;
  inset:0;
  padding:28px 22px;
  display:flex;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transform:translateY(8px);
  transition:var(--transition);
}

.screen.active{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

/* SPLASH */

#splash{
  background:#000;
  justify-content:center;
  align-items:center;
}

.logo{
  font-size:26px;
  font-weight:600;
  letter-spacing:-.5px;
  opacity:0;
  animation:fadeIn 1.2s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1}
}

/* HEADERS */

.header{
  font-size:22px;
  font-weight:600;
  margin-bottom:24px;
}

/* DECK LIST */

.deck-list{
  display:flex;
  flex-direction:column;
  gap:16px;
  overflow-y:auto;
  flex:1;
}

.deck{
  padding:22px;
  border-radius:var(--radius);
  cursor:pointer;
  transition:var(--transition);
}

.deck-title{
  font-size:18px;
  font-weight:500;
}

.deck-meta{
  font-size:14px;
  margin-top:4px;
  opacity:.8;
}

/* CREATE DECK */

input{
  background:var(--card);
  border:none;
  padding:16px;
  border-radius:14px;
  color:white;
  font-size:16px;
  outline:none;
}

.color-picker{
  display:flex;
  gap:14px;
  margin-top:16px;
}

.color{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:var(--transition);
}

.color.selected{
  border-color:white;
}

.button{
  margin-top:22px;
  background:white;
  color:black;
  padding:16px;
  border-radius:14px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
}

.button:active{
  transform:scale(.97);
}

/* FLASHCARD */

.card-wrapper{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}

.card{
  width:100%;
  max-width:340px;
  height:520px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
}

.card.flipped{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;
  inset:0;
  border-radius:var(--radius);
  padding:32px 24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:20px;
  line-height:1.4;
  backface-visibility:hidden;
}

.card-face.back{
  transform:rotateY(180deg);
}

.card-label{
  position:absolute;
  top:16px;
  left:20px;
  font-size:12px;
  opacity:.7;
  letter-spacing:.5px;
}

/* CONTROLS */

.controls{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.arrow{
  width:48px;
  height:48px;
  border-radius:50%;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  transition:var(--transition);
}

.arrow:active{
  transform:scale(.9);
}

/* RESPONSIVE CENTER ON DESKTOP */

@media(min-width:600px){
  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }
  .screen{
    max-width:420px;
    margin:auto;
    border-radius:30px;
    overflow:hidden;
    background:var(--bg);
  }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="logo">Flashcards</div>
</div>

<!-- DECK SCREEN -->
<div id="deckScreen" class="screen">
  <div class="header">Decks</div>
  <div class="deck-list" id="deckList"></div>

  <input id="deckTitleInput" placeholder="New deck title" />
  <div class="color-picker">
    <div class="color selected" style="background:#ffb703"></div>
    <div class="color" style="background:#219ebc"></div>
    <div class="color" style="background:#e63946"></div>
    <div class="color" style="background:#2a9d8f"></div>
  </div>

  <div class="button" onclick="createDeck()">Create Deck</div>
</div>

<!-- CARD SCREEN -->
<div id="cardScreen" class="screen">
  <div class="header" id="deckTitleDisplay"></div>

  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="card-face front" id="frontFace">
        <div class="card-label">Question</div>
        <div id="questionText"></div>
      </div>
      <div class="card-face back" id="backFace">
        <div class="card-label">Answer</div>
        <div id="answerText"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="arrow" onclick="prevCard()">←</div>
    <div class="arrow" onclick="nextCard()">→</div>
  </div>
</div>

<script>
let decks = JSON.parse(localStorage.getItem("flashDecks")) || [];
let selectedColor = "#ffb703";
let currentDeck = null;
let currentIndex = 0;

const splash = document.getElementById("splash");
const deckScreen = document.getElementById("deckScreen");
const cardScreen = document.getElementById("cardScreen");
const deckList = document.getElementById("deckList");
const card = document.getElementById("card");

setTimeout(()=>{
  splash.classList.remove("active");
  deckScreen.classList.add("active");
},1500);

/* COLOR PICKER */
document.querySelectorAll(".color").forEach(c=>{
  c.addEventListener("click",()=>{
    document.querySelectorAll(".color").forEach(x=>x.classList.remove("selected"));
    c.classList.add("selected");
    selectedColor=c.style.background;
  });
});

/* CREATE DECK */
function createDeck(){
  const title=document.getElementById("deckTitleInput").value.trim();
  if(!title) return;

  const newDeck={
    title,
    color:selectedColor,
    cards:[
      {q:"Tap to flip card",a:"This is the answer"},
      {q:"Swipe for next",a:"Or use arrows below"}
    ]
  };

  decks.push(newDeck);
  save();
  renderDecks();
  document.getElementById("deckTitleInput").value="";
}

function renderDecks(){
  deckList.innerHTML="";
  decks.forEach((deck,i)=>{
    const d=document.createElement("div");
    d.className="deck";
    d.style.background=deck.color;
    d.innerHTML=`
      <div class="deck-title">${deck.title}</div>
      <div class="deck-meta">${deck.cards.length} cards</div>
    `;
    d.onclick=()=>openDeck(i);
    deckList.appendChild(d);
  });
}

function openDeck(i){
  currentDeck=decks[i];
  currentIndex=0;
  deckScreen.classList.remove("active");
  cardScreen.classList.add("active");
  document.getElementById("deckTitleDisplay").innerText=currentDeck.title;
  updateCard();
}

function updateCard(){
  card.classList.remove("flipped");
  const c=currentDeck.cards[currentIndex];
  document.getElementById("questionText").innerText=c.q;
  document.getElementById("answerText").innerText=c.a;
  document.querySelectorAll(".card-face").forEach(face=>{
    face.style.background=currentDeck.color;
  });
}

function nextCard(){
  if(currentIndex<currentDeck.cards.length-1){
    currentIndex++;
    updateCard();
  }
}

function prevCard(){
  if(currentIndex>0){
    currentIndex--;
    updateCard();
  }
}

card.addEventListener("click",()=>{
  card.classList.toggle("flipped");
});

/* SWIPE SUPPORT */
let startX=0;
card.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});
card.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(diff>60) prevCard();
  if(diff<-60) nextCard();
});

function save(){
  localStorage.setItem("flashDecks",JSON.stringify(decks));
}

renderDecks();
</script>

</body>
</html>
