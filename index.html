<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memora - Flashcard Learning</title>

  <style>
    :root{
      --primary:#3B82F6;
      --primary-dark:#1E40AF;
      --success:#10B981;
      --danger:#EF4444;

      --bg-primary:#0F172A;
      --bg-secondary:#1E293B;
      --bg-tertiary:#334155;

      --text-primary:#F1F5F9;
      --text-secondary:#CBD5E1;

      --border:#475569;

      --radius-sm:8px;
      --radius-md:12px;
      --radius-lg:16px;

      --transition: all .28s cubic-bezier(.4,0,.2,1);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg-primary);
      color:var(--text-primary);
      min-height:100vh;
      overflow:hidden;
    }

    .screen{
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      opacity:0; pointer-events:none;
      transform:translateY(18px);
      transition:var(--transition);
      padding:20px;
    }
    .screen.active{opacity:1;pointer-events:auto;transform:translateY(0)}

    /* ---------------- SPLASH ---------------- */
    #splash{
      justify-content:center; align-items:center;
      text-align:center; gap:14px;
      background:
        radial-gradient(900px 520px at 25% 20%, rgba(59,130,246,0.22), transparent 55%),
        radial-gradient(800px 480px at 80% 65%, rgba(139,92,246,0.20), transparent 60%),
        linear-gradient(180deg, #0B1222 0%, #0F172A 65%, #0B1222 100%);
    }
    .splash-card{
      width:min(420px,92vw);
      border-radius:22px;
      padding:22px 18px;
      background:rgba(15,23,42,.56);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      box-shadow:0 18px 70px rgba(0,0,0,.55);
      display:flex; flex-direction:column; align-items:center;
      gap:10px;
    }
    .splash-logo{
      width:min(220px,60vw);
      height:auto;
      filter:drop-shadow(0 14px 40px rgba(0,0,0,.45));
      user-select:none; -webkit-user-drag:none;
      opacity:.95;
    }
    .splash-title{
      font-size:40px;
      font-weight:900;
      letter-spacing:.2px;
      color:var(--text-primary);
      text-shadow:0 8px 20px rgba(0,0,0,.4);
    }
    .tagline{
      font-size:15px;
      color:rgba(241,245,249,.85);
      font-weight:650;
      letter-spacing:.4px;
    }
    .hint{
      margin-top:6px;
      font-size:13px;
      font-weight:650;
      color:rgba(241,245,249,.82);
    }

    /* ---------------- Header / Buttons ---------------- */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:12px;
    }
    .header-title{
      font-size:28px;
      font-weight:900;
      flex:1;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:var(--radius-md);
      border:none;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      transition:var(--transition);
      gap:8px;
      min-height:44px;
      user-select:none;
      touch-action:manipulation;
    }
    .btn svg{
      width:18px;height:18px;
      stroke:currentColor;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
      fill:none;
    }
    .btn-primary{background:var(--primary); color:white; width:100%}
    .btn-primary:active{background:var(--primary-dark); transform:scale(.98)}

    .btn-circle{
      width:44px;height:44px;
      padding:0;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--bg-tertiary);
      color:var(--text-primary);
    }
    .btn-circle:active{background:var(--border); transform:scale(.98)}
    .btn-circle.danger{
      background:var(--danger);
      border-color:rgba(255,255,255,.18);
      color:white;
    }
    .btn-circle.danger:active{transform:scale(.98)}

    /* ---------------- Decks ---------------- */
    .deck-grid{
      flex:1;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      overflow-y:auto;
      margin-bottom:18px;
      padding-right:4px;
    }

    /* Add drop shadow + subtle stack feel */
    .deck-card{
      aspect-ratio:1;
      padding:14px;
      border-radius:var(--radius-lg);
      cursor:pointer;
      transition:var(--transition);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border:1px solid rgba(255,255,255,.10);
      position:relative;
      overflow:hidden;
      user-select:none;
      touch-action:manipulation;
      box-shadow: 0 12px 28px rgba(0,0,0,.38);
    }
    .deck-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(140% 120% at 20% 15%, rgba(255,255,255,.18), transparent 60%);
      pointer-events:none;
      opacity:.6;
    }
    .deck-card:active{transform:scale(.965)}
    .deck-card.long-press{border-color:rgba(239,68,68,.85)}

    /* Title now at TOP and smaller for long names */
    .deck-title{
      font-size:13px; /* smaller */
      font-weight:900;
      line-height:1.25;
      word-break:break-word;
      padding-right:44px;
      z-index:1; /* ensure above overlay */
    }

    .deck-count{
      position:absolute;
      top:10px; right:10px;
      width:30px; height:30px;
      border-radius:999px;
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
      font-size:12px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      z-index:2;
    }

    .input-group{display:flex; flex-direction:column; gap:12px; margin-bottom:12px}
    input[type="text"]{
      background:var(--bg-secondary);
      border:1px solid var(--border);
      padding:12px 14px;
      border-radius:var(--radius-md);
      color:var(--text-primary);
      font-size:16px;
      font-family:inherit;
      transition:var(--transition);
    }
    input[type="text"]:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(59,130,246,.12);
    }

    /* ---------------- Color Picker (fit on page) ---------------- */
    .color-group{margin-bottom:12px}
    .color-label{
      font-size:12px;
      font-weight:900;
      color:var(--text-secondary);
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:10px;
      display:block;
    }
    .palette-wrap{
      background:rgba(30,41,59,.25);
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius-lg);
      padding:10px;
    }
    .color-palette{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:space-between;
    }
    .swatch{
      width:44px;height:44px;border-radius:999px;
      cursor:pointer;
      border:none;
      transition:var(--transition);
      position:relative;
      box-shadow:none;
    }
    .swatch:hover{transform:scale(1.06)}
    .swatch.selected{
      outline:3px solid rgba(241,245,249,.92);
      outline-offset:2px;
      transform:scale(1.08);
    }
    .swatch::after{
      content:"";
      position:absolute; inset:0;
      border-radius:999px;
      background:radial-gradient(100% 100% at 20% 20%, rgba(255,255,255,.18), transparent 55%);
      pointer-events:none;
      opacity:.9;
    }
    .swatch.custom{
      background:conic-gradient(from 90deg, #3B82F6, #8B5CF6, #EC4899, #F59E0B, #10B981, #06B6D4, #3B82F6);
      overflow:hidden;
    }
    .swatch.custom input[type="color"]{
      position:absolute; inset:-10px;
      opacity:0;
      cursor:pointer;
    }

    /* ---------------- Cards ---------------- */
    .card-container{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
      perspective:1200px;
    }
    .card-stack{
      width:100%;
      max-width:320px;
      aspect-ratio:3/4;
      position:relative;
    }

    .flashcard{
      position:absolute; inset:0;
      cursor:pointer;
      user-select:none;
      touch-action:none;
      will-change:transform;
    }
    .flashcard.exit-left{animation:exitLeft .34s ease-out forwards}
    .flashcard.exit-right{animation:exitRight .34s ease-out forwards}
    @keyframes exitLeft{
      0%{transform:translateX(var(--drag-x,0px)) rotateZ(var(--drag-r,0deg)); opacity:1}
      100%{transform:translateX(-130%) rotateZ(-18deg); opacity:0}
    }
    @keyframes exitRight{
      0%{transform:translateX(var(--drag-x,0px)) rotateZ(var(--drag-r,0deg)); opacity:1}
      100%{transform:translateX(130%) rotateZ(18deg); opacity:0}
    }

    .flashcard-inner{
      position:relative;
      width:100%; height:100%;
      transform-style:preserve-3d;
      transition:transform .52s;
    }
    .flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}

    .card-face{
      position:absolute;
      width:100%; height:100%;
      border-radius:var(--radius-lg);
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      backface-visibility:hidden;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:none;
    }

    .card-face.back{
      transform:rotateY(180deg);
      background:#FFFFFF !important;
      color:#0F172A !important;
      border:1px solid rgba(15,23,42,.14);
    }

    .card-label{
      position:absolute;
      top:12px; left:12px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      background:rgba(0,0,0,.22);
      padding:4px 8px;
      border-radius:var(--radius-sm);
      opacity:.95;
    }
    .card-counter{
      position:absolute;
      top:12px; right:12px;
      font-size:12px;
      font-weight:900;
      background:rgba(0,0,0,.22);
      padding:4px 8px;
      border-radius:var(--radius-sm);
      opacity:.95;
    }
    .card-face.back .card-label,
    .card-face.back .card-counter{
      background:rgba(15,23,42,.08);
      color:#0F172A;
      opacity:1;
    }

    .card-content{
      font-size:20px;
      font-weight:650;
      line-height:1.5;
      word-wrap:break-word;
      width:100%;
    }
    .card-content b, .card-content strong{font-weight:900}
    .card-content ul{
      text-align:left;
      margin:10px auto 0;
      padding-left:22px;
      width:100%;
    }
    .card-content li{margin:6px 0}
    .card-content p{margin:0}
    .card-content div{margin:0}

    .progress-display{
      text-align:center;
      font-size:14px;
      color:var(--text-secondary);
      margin-top:14px;
      font-weight:750;
    }

    .controls{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      margin-top:14px;
    }
    .control-btn{
      width:60px;height:60px;
      border-radius:999px;
      border:2px solid var(--border);
      cursor:pointer;
      transition:var(--transition);
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg-tertiary);
      color:var(--text-primary);
      user-select:none;
      touch-action:manipulation;
      box-shadow:none;
    }
    .control-btn:active{transform:scale(.92)}
    .control-btn.primary{
      background:var(--success);
      border-color:var(--success);
      width:70px;height:70px;
      color:white;
    }
    .control-btn svg{
      width:24px;height:24px;
      stroke:currentColor;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
      fill:none;
    }
    .control-btn.primary svg{width:28px;height:28px}

    /* ---------------- Editor Screen ---------------- */
    .editor-container{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow-y:auto;
      margin-bottom:10px;
      padding-right:4px;
    }

    .editor-card{
      background:var(--bg-secondary);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:12px;
      display:flex;
      gap:12px;
      align-items:center;
      transition:var(--transition);
    }
    .editor-card:hover{border-color:var(--primary); background:var(--bg-tertiary)}
    .editor-card-content{flex:1; min-width:0}
    .editor-card-q{
      font-size:13px;
      font-weight:900;
      color:var(--text-primary);
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .editor-card-a{
      font-size:12px;
      color:var(--text-secondary);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:750;
    }

    .editor-actions{display:flex; gap:6px}
    .editor-btn{
      width:36px;height:36px;
      border-radius:var(--radius-sm);
      border:1px solid rgba(255,255,255,.10);
      background:var(--bg-primary);
      color:var(--text-secondary);
      cursor:pointer;
      transition:var(--transition);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .editor-btn:hover{background:var(--primary); color:white; border-color:transparent}
    .editor-btn.danger{background:rgba(239,68,68,.20); border-color:rgba(239,68,68,.35); color:white}
    .editor-btn.danger:hover{background:var(--danger)}
    .editor-btn svg{
      width:16px;height:16px;
      stroke:currentColor;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
      fill:none;
    }

    .editor-addbar{display:flex; gap:10px; align-items:center; margin-top:6px}
    .btn-add{
      width:100%;
      background:rgba(59,130,246,.18);
      border:1px solid rgba(59,130,246,.35);
      color:var(--text-primary);
      font-weight:900;
    }
    .btn-add:active{transform:scale(.99)}

    /* Deck title editing input (in editor screen) */
    .deck-title-edit{
      background:rgba(30,41,59,.35);
      border:1px solid rgba(255,255,255,.10);
      border-radius:var(--radius-lg);
      padding:10px;
      margin-bottom:12px;
    }
    .deck-title-edit label{
      display:block;
      font-size:12px;
      font-weight:900;
      letter-spacing:.5px;
      text-transform:uppercase;
      color:rgba(203,213,225,.85);
      margin-bottom:8px;
    }
    .deck-title-edit input{
      width:100%;
    }

    /* ---------------- FULLSCREEN POPUP EDITOR ---------------- */
    .modal-overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.60);
      opacity:0;
      pointer-events:none;
      transition:var(--transition);
    }
    .modal-overlay.active{opacity:1; pointer-events:auto}

    .modal{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(30,41,59,.98), rgba(15,23,42,.98));
      transform:translateY(6px);
      opacity:0;
      pointer-events:none;
      transition:var(--transition);
      display:flex;
      flex-direction:column;
      padding:16px;
      gap:12px;
    }
    .modal.active{
      transform:translateY(0);
      opacity:1;
      pointer-events:auto;
    }

    .modal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .modal-title{
      display:flex;
      flex-direction:column;
      gap:2px;
      flex:1;
      min-width:0;
    }
    .modal-title h3{
      font-size:16px;
      font-weight:900;
      color:rgba(241,245,249,.95);
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .modal-title p{
      font-size:12px;
      font-weight:750;
      color:rgba(203,213,225,.85);
      margin:0;
    }

    .toolbar{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .tool-btn{
      height:38px;
      width:44px;
      padding:0;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(51,65,85,.65);
      color:var(--text-primary);
      cursor:pointer;
      font-weight:900;
      transition:var(--transition);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }
    .tool-btn:active{transform:scale(.98)}
    .tool-btn svg{
      width:18px;height:18px;
      stroke:currentColor;
      stroke-width:2.5;
      fill:none;
    }
    /* ACTIVE formatting highlight */
    .tool-btn.active{
      background:rgba(59,130,246,.35);
      border-color:rgba(59,130,246,.55);
      box-shadow:0 0 0 3px rgba(59,130,246,.12);
    }

    .field-label{
      font-size:12px;
      font-weight:900;
      color:rgba(241,245,249,.78);
      letter-spacing:.6px;
      text-transform:uppercase;
      margin-top:2px;
    }

    .rte{
      background:rgba(15,23,42,.55);
      border:1px solid rgba(255,255,255,.14);
      border-radius:var(--radius-md);
      padding:12px 14px;
      min-height:120px;
      color:var(--text-primary);
      font-size:16px;
      line-height:1.5;
      outline:none;
      overflow:auto;
    }
    .rte:focus{
      border-color:rgba(59,130,246,.85);
      box-shadow:0 0 0 3px rgba(59,130,246,.12);
    }
    .rte ul{padding-left:22px}
    .rte li{margin:6px 0}

    .modal-body{
      flex:1;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-bottom:10px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .btn-ghost{
      width:100%;
      background:rgba(255,255,255,.06);
      color:rgba(241,245,249,.92);
      border:1px solid rgba(255,255,255,.10);
    }
    .btn-ghost:active{transform:scale(.99)}

    @media (min-width:600px){
      .screen{
        max-width:480px;
        height:100vh;
        border-radius:var(--radius-lg);
        border:1px solid var(--border);
        margin:auto;
        box-shadow:0 20px 60px rgba(0,0,0,.3);
      }
    }

    .empty-state{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      gap:16px;
      color:var(--text-secondary);
    }
    .empty-icon{font-size:48px; opacity:.55}
    .empty-text{font-size:16px; font-weight:900}
  </style>
</head>

<body>
  <!-- Outline icons -->
  <svg style="display:none;">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></symbol>
    <symbol id="icon-arrow-up" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></symbol>
    <symbol id="icon-arrow-down" viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><path d="M20 6l-11 11-7-7"/></symbol>
    <symbol id="icon-x" viewBox="0 0 24 24"><path d="M18 6l-12 12M6 6l12 12"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
    <symbol id="icon-bold" viewBox="0 0 24 24"><path d="M6 4h7a4 4 0 0 1 0 8H6zM6 12h8a4 4 0 1 1 0 8H6z"/></symbol>
    <symbol id="icon-list" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></symbol>
    <symbol id="icon-paragraph" viewBox="0 0 24 24"><path d="M13 4h5M13 8h5M13 12h5"/><path d="M6 4h5a4 4 0 0 1 0 8H9v8"/></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  </svg>

  <!-- SPLASH -->
  <div id="splash" class="screen active">
    <div class="splash-card">
      <img class="splash-logo" src="memora-logo.png" alt="Memora Logo" />
      <div class="splash-title">Memora</div>
      <div class="tagline">Remember more, faster</div>
      <div class="hint">Tap to start</div>
    </div>
  </div>

  <!-- DECKS -->
  <div id="deckScreen" class="screen">
    <div class="header">
      <div class="header-title">Your decks</div>
    </div>

    <div class="deck-grid" id="deckList"></div>

    <div class="input-group">
      <input type="text" id="deckTitleInput" placeholder="Enter deck name..." />
    </div>

    <div class="color-group">
      <div class="color-label">Color</div>
      <div class="palette-wrap">
        <div class="color-palette" id="colorPalette"></div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="createDeck()">Create Deck</button>
  </div>

  <!-- CARD SCREEN -->
  <div id="cardScreen" class="screen">
    <div class="header">
      <button class="btn btn-circle" onclick="backToDeckList()" aria-label="Back">
        <svg><use href="#icon-arrow-left"/></svg>
      </button>

      <div class="header-title" id="deckTitleDisplay" style="flex:1;text-align:center;"></div>

      <button class="btn btn-circle" onclick="openEditor()" aria-label="Edit cards">
        <svg><use href="#icon-edit"/></svg>
      </button>
    </div>

    <div class="card-container">
      <div class="card-stack">
        <div class="flashcard" id="flashcard" aria-label="Flashcard">
          <div class="flashcard-inner">
            <div class="card-face front" id="cardFront">
              <div class="card-label">QUESTION</div>
              <div class="card-counter" id="counterFront"></div>
              <div class="card-content" id="questionText"></div>
            </div>

            <div class="card-face back" id="cardBack">
              <div class="card-label">ANSWER</div>
              <div class="card-counter" id="counterBack"></div>
              <div class="card-content" id="answerText"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" onclick="prevCardWithAnimation()" title="Previous" aria-label="Previous">
        <svg><use href="#icon-arrow-left"/></svg>
      </button>

      <button class="control-btn primary" onclick="rateCard(5)" title="Mark as reviewed" aria-label="Reviewed">
        <svg><use href="#icon-check"/></svg>
      </button>

      <button class="control-btn" onclick="nextCardWithAnimation()" title="Next" aria-label="Next">
        <svg><use href="#icon-arrow-right"/></svg>
      </button>
    </div>

    <div class="progress-display" id="progress"></div>
  </div>

  <!-- EDITOR -->
  <div id="editorScreen" class="screen">
    <div class="header">
      <div class="header-title">Edit deck</div>
      <button class="btn btn-circle danger" onclick="backToCardScreen()" aria-label="Close editor">
        <svg><use href="#icon-x"/></svg>
      </button>
    </div>

    <!-- Edit deck title -->
    <div class="deck-title-edit">
      <label for="editDeckTitleInput">Deck title</label>
      <input type="text" id="editDeckTitleInput" placeholder="Deck title..." oninput="updateDeckTitleLive()" />
    </div>

    <div class="editor-container" id="editorList"></div>

    <div class="editor-addbar">
      <button class="btn btn-add" onclick="openModalForNew()">
        <svg><use href="#icon-plus"/></svg>
        Add card
      </button>
    </div>

    <!-- Fullscreen editor modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(true)"></div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Edit card">
      <div class="modal-top">
        <div class="modal-title">
          <h3 id="modalTitle">New card</h3>
          <p id="modalSub">Formatting shows on cards.</p>
        </div>
        <button class="btn btn-circle danger" onclick="closeModal(true)" aria-label="Close editor panel">
          <svg><use href="#icon-x"/></svg>
        </button>
      </div>

      <div class="toolbar">
        <button class="tool-btn" id="btnBold" onclick="toggleBold()" title="Bold">
          <svg><use href="#icon-bold"/></svg>
        </button>

        <!-- This one toggles between bullets and paragraph icon based on state -->
        <button class="tool-btn" id="btnList" onclick="toggleBullets()" title="Bullets / Paragraph">
          <svg id="listIcon"><use href="#icon-list"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="field-label">Question</div>
        <div id="newQ" class="rte" contenteditable="true" spellcheck="true" data-placeholder="Question..."></div>

        <div class="field-label">Answer</div>
        <div id="newA" class="rte" contenteditable="true" spellcheck="true" data-placeholder="Answer..."></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal(true)">Cancel</button>
        <button class="btn btn-primary" onclick="addOrSaveCard()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let decks = [];
    let currentDeck = null;
    let currentIndex = 0;

    // modal state
    let editingCardIndex = null;

    // 6 + custom
    const deckColors = ["#3B82F6","#8B5CF6","#10B981","#F59E0B","#EF4444","#06B6D4"];
    const defaultColor = deckColors[0];
    let customColor = "#EC4899";

    function save(){ localStorage.setItem("flashDecks", JSON.stringify(decks)); }

    function load(){
      decks = JSON.parse(localStorage.getItem("flashDecks")) || [];
      if(decks.length === 0){
        decks.push({
          title:"Welcome to Memora",
          color: defaultColor,
          cards:[
            { q:"Swipe left or right", a:"Drag the card to move through the deck." },
            { q:"Tap to flip", a:"<b>Tap</b> the card to reveal the answer." }
          ]
        });
        save();
      }
    }

    function showScreen(screenId){
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    window.addEventListener("load", ()=>{
      load();
      setupColorPalette();
      renderDecks();

      const goDecks = () => showScreen("deckScreen");
      const splashTimer = setTimeout(goDecks, 900);
      const splash = document.getElementById("splash");
      splash.addEventListener("click", ()=>{ clearTimeout(splashTimer); goDecks(); }, { once:true });
      splash.addEventListener("touchstart", ()=>{ clearTimeout(splashTimer); goDecks(); }, { once:true, passive:true });

      setupRTEPlaceholders();
      closeModal(true);
    });

    function haptic(){ if(navigator.vibrate) navigator.vibrate([10]); }

    /* -------- Color palette -------- */
    function setupColorPalette(){
      const palette = document.getElementById("colorPalette");
      palette.innerHTML = "";

      deckColors.forEach(color=>{
        const sw = document.createElement("div");
        sw.className = "swatch";
        sw.style.background = color;
        sw.dataset.color = color;
        sw.onclick = ()=>selectColor(color,false);
        palette.appendChild(sw);
      });

      const custom = document.createElement("div");
      custom.className = "swatch custom";
      custom.id = "customSwatch";
      custom.title = "Custom color";

      const input = document.createElement("input");
      input.type="color";
      input.value=customColor;
      input.oninput = (e)=>{ customColor = e.target.value; selectColor(customColor,true); };
      input.onclick = (e)=>e.stopPropagation();

      custom.appendChild(input);
      custom.onclick = ()=>selectColor(customColor,true);

      palette.appendChild(custom);
      selectColor(defaultColor,false);
    }

    function selectColor(color,isCustom){
      document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("selected"));
      if(isCustom) document.getElementById("customSwatch").classList.add("selected");
      else {
        const el = document.querySelector('[data-color="'+color+'"]');
        if(el) el.classList.add("selected");
      }
    }

    function getSelectedColor(){
      const fixed = document.querySelector(".swatch.selected[data-color]");
      const custom = document.querySelector("#customSwatch.selected");
      if(fixed) return fixed.dataset.color;
      if(custom) return customColor;
      return defaultColor;
    }

    /* -------- Deck creation: pre-populate with 1 placeholder card -------- */
    function createDeck(){
      const title = document.getElementById("deckTitleInput").value.trim();
      if(!title) return;

      decks.push({
        title,
        color:getSelectedColor(),
        cards:[
          { q:"(Question)", a:"(Answer)" }
        ]
      });

      save();
      renderDecks();

      document.getElementById("deckTitleInput").value = "";
      selectColor(defaultColor,false);
    }

    function isLightColor(color){
      const hex = color.replace("#","");
      const r = parseInt(hex.substr(0,2),16);
      const g = parseInt(hex.substr(2,2),16);
      const b = parseInt(hex.substr(4,2),16);
      const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
      return luminance > 0.6;
    }

    function renderDecks(){
      const deckList = document.getElementById("deckList");
      deckList.innerHTML = "";

      decks.forEach((deck,i)=>{
        const card = document.createElement("div");
        card.className = "deck-card";
        card.style.background = deck.color;

        const textColor = isLightColor(deck.color) ? "#0F172A" : "#F1F5F9";
        card.style.color = textColor;

        // Title is at TOP (visible even when overlapping)
        const titleDiv = document.createElement("div");
        titleDiv.className = "deck-title";
        titleDiv.innerText = deck.title;
        card.appendChild(titleDiv);

        const badge = document.createElement("div");
        badge.className = "deck-count";
        badge.innerText = deck.cards.length;
        badge.style.color = textColor;
        badge.style.background = isLightColor(deck.color) ? "rgba(255,255,255,0.35)" : "rgba(0,0,0,0.22)";
        badge.style.borderColor = isLightColor(deck.color) ? "rgba(15,23,42,0.18)" : "rgba(255,255,255,0.18)";
        card.appendChild(badge);

        let pressTimer;
        const handlePress = ()=>{
          pressTimer = setTimeout(()=>{
            card.classList.add("long-press");
            if(confirm('Delete "'+deck.title+'"? This cannot be undone.')){
              decks.splice(i,1); save(); renderDecks();
            } else card.classList.remove("long-press");
          },650);
        };
        const handleRelease = ()=>{
          clearTimeout(pressTimer);
          card.classList.remove("long-press");
        };

        card.addEventListener("mousedown", handlePress);
        card.addEventListener("touchstart", handlePress, { passive:true });
        card.addEventListener("mouseup", handleRelease);
        card.addEventListener("mouseleave", handleRelease);
        card.addEventListener("touchend", handleRelease);

        card.addEventListener("click", ()=>{
          if(pressTimer) clearTimeout(pressTimer);
          openDeck(i);
        });

        deckList.appendChild(card);
      });
    }

    function openDeck(i){
      currentDeck = decks[i];
      currentIndex = 0;
      document.getElementById("deckTitleDisplay").innerText = currentDeck.title;
      updateCardVisuals();
      updateCard();
      showScreen("cardScreen");
      haptic();
    }

    function updateCardVisuals(){
      const front = document.getElementById("cardFront");
      const textColor = isLightColor(currentDeck.color) ? "#0F172A" : "#F1F5F9";
      front.style.background = currentDeck.color;
      front.style.color = textColor;

      const back = document.getElementById("cardBack");
      back.style.background = "#FFFFFF";
      back.style.color = "#0F172A";
    }

    function updateCard(){
      const flashcard = document.getElementById("flashcard");
      flashcard.classList.remove("flipped","exit-left","exit-right");
      flashcard.style.transform = "";
      flashcard.style.setProperty("--drag-x","0px");
      flashcard.style.setProperty("--drag-r","0deg");

      if(!currentDeck.cards.length){
        document.getElementById("questionText").innerHTML =
          '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No cards yet. Create one to get started!</div></div>';
        document.getElementById("answerText").innerHTML = "";
        document.getElementById("progress").innerText = "";
        document.getElementById("counterFront").innerText = "";
        document.getElementById("counterBack").innerText = "";
        return;
      }

      const card = currentDeck.cards[currentIndex];
      const counter = (currentIndex+1) + "/" + currentDeck.cards.length;

      document.getElementById("questionText").innerHTML = card.q || "";
      document.getElementById("answerText").innerHTML = card.a || "";

      document.getElementById("progress").innerText = counter;
      document.getElementById("counterFront").innerText = counter;
      document.getElementById("counterBack").innerText = counter;
    }

    /* -------- swipe -------- */
    const flashcardEl = document.getElementById("flashcard");
    let startX=0,startY=0,lastX=0,startT=0;
    let pointerId=null, dragging=false, locked=null;

    const COMMIT_DISTANCE_X=26;
    const COMMIT_VELOCITY_X=0.55;
    const LOCK_THRESHOLD=6;

    function clamp(n,min,max){return Math.max(min,Math.min(max,n));}

    flashcardEl.addEventListener("pointerdown",(e)=>{
      pointerId = e.pointerId;
      flashcardEl.setPointerCapture(pointerId);
      startX = lastX = e.clientX;
      startY = e.clientY;
      startT = performance.now();
      dragging = false;
      locked = null;
      flashcardEl.classList.remove("exit-left","exit-right");
      flashcardEl.style.transition="none";
    });

    flashcardEl.addEventListener("pointermove",(e)=>{
      if(pointerId !== e.pointerId) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      lastX = e.clientX;

      if(!locked){
        if(Math.abs(dx)>LOCK_THRESHOLD || Math.abs(dy)>LOCK_THRESHOLD){
          locked = Math.abs(dx)>Math.abs(dy) ? "x" : "y";
          dragging = true;
        }
      }
      if(locked==="x"){
        e.preventDefault();
        const rot = clamp(dx*0.06, -12, 12);
        flashcardEl.style.transform = `translateX(${dx}px) rotateZ(${rot}deg)`;
        flashcardEl.style.setProperty("--drag-x", dx+"px");
        flashcardEl.style.setProperty("--drag-r", rot+"deg");
      }
    }, { passive:false });

    flashcardEl.addEventListener("pointerup",()=>{
      const dx = lastX - startX;
      const dt = Math.max(1, performance.now()-startT);
      const vx = dx/dt;

      flashcardEl.style.transition="transform 0.18s ease-out";

      if(locked==="x"){
        const commit = Math.abs(dx)>=COMMIT_DISTANCE_X || Math.abs(vx)>=COMMIT_VELOCITY_X;
        if(commit){
          if(dx>0) prevCardWithAnimation();
          else nextCardWithAnimation();
        } else {
          flashcardEl.style.transform="";
        }
      } else {
        if(!dragging){
          flashcardEl.classList.toggle("flipped");
          haptic();
        } else flashcardEl.style.transform="";
      }

      pointerId=null; dragging=false; locked=null;
    });

    flashcardEl.addEventListener("pointercancel",()=>{
      pointerId=null; dragging=false; locked=null;
      flashcardEl.style.transform="";
    });

    function nextCardWithAnimation(){
      if(!currentDeck || currentIndex >= currentDeck.cards.length-1){
        flashcardEl.style.transform="";
        return;
      }
      flashcardEl.classList.remove("exit-right");
      flashcardEl.classList.add("exit-left");
      setTimeout(()=>{ currentIndex++; updateCard(); haptic(); }, 260);
    }

    function prevCardWithAnimation(){
      if(!currentDeck || currentIndex <= 0){
        flashcardEl.style.transform="";
        return;
      }
      flashcardEl.classList.remove("exit-left");
      flashcardEl.classList.add("exit-right");
      setTimeout(()=>{ currentIndex--; updateCard(); haptic(); }, 260);
    }

    function rateCard(score){
      if(!currentDeck || !currentDeck.cards.length) return;

      const card = currentDeck.cards[currentIndex];
      card.interval = card.interval || 1;
      card.ease = card.ease || 2.5;
      card.interval = Math.round(card.interval * card.ease);
      card.ease = Math.max(1.3, card.ease + (0.1 - (5 - score) * (0.08 + (5 - score) * 0.02)));

      save();
      nextCardWithAnimation();
    }

    /* -------- editor -------- */
    function openEditor(){
      // populate deck title input
      document.getElementById("editDeckTitleInput").value = currentDeck.title || "";
      renderEditor();
      showScreen("editorScreen");
    }

    function updateDeckTitleLive(){
      if(!currentDeck) return;
      currentDeck.title = document.getElementById("editDeckTitleInput").value;
      save();
      // reflect in card screen header too
      document.getElementById("deckTitleDisplay").innerText = currentDeck.title;
      // reflect in deck list when going back
    }

    function renderEditor(){
      const list = document.getElementById("editorList");
      list.innerHTML = "";

      currentDeck.cards.forEach((card,i)=>{
        const div = document.createElement("div");
        div.className = "editor-card";

        const content = document.createElement("div");
        content.className = "editor-card-content";

        const qPlain = stripHTML(card.q || "");
        const aPlain = stripHTML(card.a || "");

        content.innerHTML =
          '<div class="editor-card-q">Q' + (i+1) + ": " + escapeHTML(qPlain) + "</div>" +
          '<div class="editor-card-a">A: ' + escapeHTML(aPlain) + "</div>";

        const actions = document.createElement("div");
        actions.className = "editor-actions";

        const editBtn = document.createElement("button");
        editBtn.className = "editor-btn";
        editBtn.innerHTML = '<svg><use href="#icon-edit"/></svg>';
        editBtn.title = "Edit";
        editBtn.onclick = ()=>openModalForEdit(i);

        const upBtn = document.createElement("button");
        upBtn.className = "editor-btn";
        upBtn.innerHTML = '<svg><use href="#icon-arrow-up"/></svg>';
        upBtn.title = "Move up";
        upBtn.onclick = ()=>moveCard(i,-1);

        const downBtn = document.createElement("button");
        downBtn.className = "editor-btn";
        downBtn.innerHTML = '<svg><use href="#icon-arrow-down"/></svg>';
        downBtn.title = "Move down";
        downBtn.onclick = ()=>moveCard(i,1);

        const delBtn = document.createElement("button");
        delBtn.className = "editor-btn danger";
        delBtn.innerHTML = '<svg><use href="#icon-x"/></svg>';
        delBtn.title = "Delete";
        delBtn.onclick = ()=>deleteCard(i);

        actions.appendChild(editBtn);
        actions.appendChild(upBtn);
        actions.appendChild(downBtn);
        actions.appendChild(delBtn);

        div.appendChild(content);
        div.appendChild(actions);
        list.appendChild(div);
      });
    }

    function setRTEContent(el, html){
      el.removeAttribute("data-empty");
      el.style.color = "";
      el.innerHTML = html || "";
    }

    function openModalForNew(){
      editingCardIndex = null;
      document.getElementById("modalTitle").innerText = "New card";
      document.getElementById("modalSub").innerText = "Formatting shows on cards.";
      setRTEContent(document.getElementById("newQ"), "(Question)");
      setRTEContent(document.getElementById("newA"), "(Answer)");
      openModal();
      refreshFormatUI();
    }

    function openModalForEdit(i){
      editingCardIndex = i;
      document.getElementById("modalTitle").innerText = "Edit card " + (i+1);
      document.getElementById("modalSub").innerText = "Formatting shows on cards.";
      setRTEContent(document.getElementById("newQ"), currentDeck.cards[i].q || "");
      setRTEContent(document.getElementById("newA"), currentDeck.cards[i].a || "");
      openModal();
      refreshFormatUI();
    }

    function openModal(){
      document.getElementById("modalOverlay").classList.add("active");
      document.getElementById("modal").classList.add("active");
      // no focus to avoid keyboard auto pop
    }

    function closeModal(silent=false){
      document.getElementById("modalOverlay").classList.remove("active");
      document.getElementById("modal").classList.remove("active");
      if(!silent) haptic();
    }

    function addOrSaveCard(){
      const q = sanitizeBasic(document.getElementById("newQ").innerHTML.trim());
      const a = sanitizeBasic(document.getElementById("newA").innerHTML.trim());
      if(!q || !a) return;

      if(editingCardIndex !== null){
        currentDeck.cards[editingCardIndex].q = q;
        currentDeck.cards[editingCardIndex].a = a;
      } else {
        currentDeck.cards.push({ q, a });
      }

      save();
      renderEditor();
      updateCard();
      closeModal();
      haptic();
    }

    /* -------- Formatting UI: active highlight + list icon toggles paragraph/list -------- */
    const btnBold = () => document.getElementById("btnBold");
    const btnList = () => document.getElementById("btnList");
    const listIcon = () => document.getElementById("listIcon");

    // Track which field user last interacted with (so formatting applies there)
    let activeEditor = null;
    ["newQ","newA"].forEach(id=>{
      const el = () => document.getElementById(id);
      el().addEventListener("focus", ()=>{ activeEditor = el(); refreshFormatUI(); });
      el().addEventListener("keyup", refreshFormatUI);
      el().addEventListener("mouseup", refreshFormatUI);
    });

    function ensureActiveEditor(){
      // default to question if none (but do NOT focus automatically)
      if(!activeEditor) activeEditor = document.getElementById("newQ");
    }

    function toggleBold(){
      ensureActiveEditor();
      document.execCommand("bold", false, null);
      refreshFormatUI();
    }

    function toggleBullets(){
      ensureActiveEditor();

      const inList = document.queryCommandState("insertUnorderedList");
      if(inList){
        // turn bullets off
        document.execCommand("insertUnorderedList", false, null);
      } else {
        // turn bullets on
        document.execCommand("insertUnorderedList", false, null);
      }
      refreshFormatUI();
    }

    function refreshFormatUI(){
      // bold state
      const isBold = document.queryCommandState("bold");
      btnBold().classList.toggle("active", !!isBold);

      // list state
      const isList = document.queryCommandState("insertUnorderedList");
      btnList().classList.toggle("active", !!isList);

      // icon swap: list -> paragraph when list is ON
      if(isList){
        listIcon().innerHTML = '<use href="#icon-paragraph"></use>';
        btnList().title = "Paragraph";
      } else {
        listIcon().innerHTML = '<use href="#icon-list"></use>';
        btnList().title = "Bullets";
      }
    }

    /* -------- move/delete -------- */
    function moveCard(i,dir){
      const newI = i+dir;
      if(newI<0 || newI>=currentDeck.cards.length) return;
      const tmp = currentDeck.cards[i];
      currentDeck.cards[i] = currentDeck.cards[newI];
      currentDeck.cards[newI] = tmp;
      save(); renderEditor(); updateCard();
    }

    function deleteCard(i){
      if(confirm("Delete this card?")){
        currentDeck.cards.splice(i,1);
        save(); renderEditor();
        if(currentIndex >= currentDeck.cards.length) currentIndex = Math.max(0, currentDeck.cards.length-1);
        updateCard();
        if(editingCardIndex === i) closeModal(true);
      }
    }

    function backToCardScreen(){
      closeModal(true);
      // ensure latest deck title is visible on card screen
      document.getElementById("deckTitleDisplay").innerText = currentDeck ? currentDeck.title : "";
      showScreen("cardScreen");
    }

    function backToDeckList(){
      closeModal(true);
      // save any title edits already done
      save();
      currentDeck = null;
      renderDecks();
      showScreen("deckScreen");
    }

    /* -------- helpers -------- */
    function stripHTML(html){
      const div = document.createElement("div");
      div.innerHTML = html;
      return (div.textContent || div.innerText || "").trim();
    }
    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function sanitizeBasic(html){
      const allowed = new Set(["B","STRONG","UL","OL","LI","BR","DIV","P"]);
      const root = document.createElement("div");
      root.innerHTML = html;

      const walker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT, null);
      const toRemove = [];
      while(walker.nextNode()){
        const node = walker.currentNode;
        [...node.attributes].forEach(a=>node.removeAttribute(a.name));
        if(!allowed.has(node.tagName)) toRemove.push(node);
      }
      toRemove.forEach(node=>{
        const parent = node.parentNode;
        while(node.firstChild) parent.insertBefore(node.firstChild, node);
        parent.removeChild(node);
      });

      return root.innerHTML.trim();
    }

    function setupRTEPlaceholders(){
      document.querySelectorAll(".rte").forEach(el=>{
        const placeholder = el.dataset.placeholder || "";
        const apply = ()=>{
          const isTrulyEmpty = el.innerText.trim().length===0 && el.innerHTML.replaceAll("<br>","").trim()==="";
          if(isTrulyEmpty){
            el.setAttribute("data-empty","true");
            el.style.color = "rgba(203,213,225,0.70)";
            el.innerHTML = escapeHTML(placeholder);
          }
        };
        const clear = ()=>{
          if(el.getAttribute("data-empty")==="true"){
            el.removeAttribute("data-empty");
            el.innerHTML = "";
            el.style.color = "";
          }
        };
        apply();
        el.addEventListener("focus", clear);
        el.addEventListener("blur", apply);
      });
    }
  </script>
</body>
</html>
