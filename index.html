<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcards</title>

<style>
:root {
  --bg: #0f0f10;
  --card-bg: #1a1a1c;
  --text: #ffffff;
  --muted: #8e8e93;
  --radius: 18px;
  --transition: 0.4s cubic-bezier(.4,0,.2,1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* Shared Layout */

.screen {
  position: absolute;
  inset: 0;
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: var(--transition);
}

.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

/* Splash */

#splash {
  justify-content: center;
  align-items: center;
  background: #000;
}

.logo {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
  animation: fadeIn 1.2s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Header */

.header {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 28px;
}

/* Deck Grid */

.deck-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}

.deck {
  background: var(--card-bg);
  padding: 20px;
  border-radius: var(--radius);
  transition: var(--transition);
  cursor: pointer;
}

.deck:hover {
  transform: scale(0.98);
}

.deck-title {
  font-size: 18px;
  font-weight: 500;
}

.deck-count {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}

/* Color Picker */

.color-picker {
  display: flex;
  gap: 12px;
  margin-top: 14px;
}

.color-option {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: var(--transition);
}

.color-option.selected {
  border-color: #fff;
}

/* Button */

.button {
  margin-top: auto;
  background: #fff;
  color: #000;
  padding: 16px;
  border-radius: 14px;
  text-align: center;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.button:active {
  transform: scale(0.97);
}

/* Flashcard */

.card-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 100%;
  padding: 40px 28px;
  border-radius: var(--radius);
  text-align: center;
  font-size: 18px;
  line-height: 1.4;
  transition: var(--transition);
  cursor: pointer;
}

.card.flip {
  transform: rotateY(180deg);
}

.footer-controls {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.control-btn {
  background: var(--card-bg);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: var(--transition);
}

.control-btn:active {
  transform: scale(0.9);
}

/* Responsive */

@media (min-width: 600px) {
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .screen {
    max-width: 420px;
    margin: auto;
    border-radius: 24px;
    overflow: hidden;
    background: var(--bg);
  }
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash" class="screen active">
  <div class="logo">Flashcards</div>
</div>

<!-- Deck Screen -->
<div id="deckScreen" class="screen">
  <div class="header">Your Decks</div>
  <div class="deck-list" id="deckList"></div>

  <div class="deck">
    <div class="deck-title">Create New Deck</div>
    <div class="color-picker" id="colorPicker">
      <div class="color-option selected" style="background:#ffb703"></div>
      <div class="color-option" style="background:#219ebc"></div>
      <div class="color-option" style="background:#e63946"></div>
      <div class="color-option" style="background:#2a9d8f"></div>
    </div>
  </div>

  <div class="button" onclick="createDeck()">Create Deck</div>
</div>

<!-- Flashcard Screen -->
<div id="cardScreen" class="screen">
  <div class="header" id="deckTitle"></div>

  <div class="card-container">
    <div class="card" id="flashcard" onclick="flipCard()"></div>
  </div>

  <div class="footer-controls">
    <div class="control-btn" onclick="prevCard()">←</div>
    <div class="control-btn" onclick="nextCard()">→</div>
  </div>

  <div class="button" onclick="goBack()">Back</div>
</div>

<script>
let decks = [];
let selectedColor = "#ffb703";
let currentDeck = null;
let currentIndex = 0;
let showingFront = true;

const splash = document.getElementById("splash");
const deckScreen = document.getElementById("deckScreen");
const cardScreen = document.getElementById("cardScreen");
const deckList = document.getElementById("deckList");
const flashcard = document.getElementById("flashcard");

setTimeout(() => {
  splash.classList.remove("active");
  deckScreen.classList.add("active");
}, 2000);

/* Color Picker */
document.querySelectorAll(".color-option").forEach(option => {
  option.addEventListener("click", () => {
    document.querySelectorAll(".color-option").forEach(o => o.classList.remove("selected"));
    option.classList.add("selected");
    selectedColor = option.style.background;
  });
});

/* Create Deck */
function createDeck() {
  const deck = {
    title: "New Deck " + (decks.length + 1),
    color: selectedColor,
    cards: [
      { q: "Sample Question 1", a: "Sample Answer 1" },
      { q: "Sample Question 2", a: "Sample Answer 2" }
    ]
  };
  decks.push(deck);
  renderDecks();
}

function renderDecks() {
  deckList.innerHTML = "";
  decks.forEach((deck, index) => {
    const div = document.createElement("div");
    div.className = "deck";
    div.style.background = deck.color;
    div.innerHTML = `
      <div class="deck-title">${deck.title}</div>
      <div class="deck-count">${deck.cards.length} cards</div>
    `;
    div.onclick = () => openDeck(index);
    deckList.appendChild(div);
  });
}

function openDeck(index) {
  currentDeck = decks[index];
  currentIndex = 0;
  showingFront = true;
  deckScreen.classList.remove("active");
  cardScreen.classList.add("active");
  document.getElementById("deckTitle").innerText = currentDeck.title;
  updateCard();
}

function updateCard() {
  const card = currentDeck.cards[currentIndex];
  flashcard.style.background = currentDeck.color;
  flashcard.innerText = showingFront ? card.q : card.a;
}

function flipCard() {
  showingFront = !showingFront;
  updateCard();
}

function nextCard() {
  if (currentIndex < currentDeck.cards.length - 1) {
    currentIndex++;
    showingFront = true;
    updateCard();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    showingFront = true;
    updateCard();
  }
}

function goBack() {
  cardScreen.classList.remove("active");
  deckScreen.classList.add("active");
}
</script>

</body>
</html>
