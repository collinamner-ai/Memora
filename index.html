<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Flashcards</title>

<style>
:root{
--bg:#0b0b0d;
--card:#161618;
--text:#fff;
--muted:#8e8e93;
--radius:22px;
--t:.35s cubic-bezier(.4,0,.2,1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* Screens */

.screen{
position:absolute;
inset:0;
padding:28px 22px;
display:flex;
flex-direction:column;
opacity:0;
pointer-events:none;
transform:translateY(8px);
transition:var(--t);
}

.screen.active{
opacity:1;
pointer-events:auto;
transform:translateY(0);
}

/* Splash */

#splash{
background:#000;
justify-content:center;
align-items:center;
}

.logo{
font-size:26px;
font-weight:600;
opacity:0;
animation:fade 1.2s forwards;
}

@keyframes fade{
to{opacity:1}
}

/* Header */

.header{
font-size:22px;
font-weight:600;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* Deck List */

.deck-list{
flex:1;
display:flex;
flex-direction:column;
gap:16px;
overflow-y:auto;
}

.deck{
padding:22px;
border-radius:var(--radius);
cursor:pointer;
transition:var(--t);
position:relative;
}

.deck-title{font-size:18px}
.deck-meta{font-size:14px;opacity:.8;margin-top:4px}

/* Inputs */

input, textarea{
background:var(--card);
border:none;
padding:16px;
border-radius:14px;
color:white;
font-size:16px;
outline:none;
margin-bottom:14px;
}

textarea{resize:none;height:100px}

.button{
background:white;
color:black;
padding:16px;
border-radius:14px;
text-align:center;
font-weight:600;
cursor:pointer;
transition:var(--t);
}

.button:active{transform:scale(.97)}

.muted-btn{
background:var(--card);
color:white;
}

/* Flashcard */

.card-wrapper{
flex:1;
display:flex;
align-items:center;
justify-content:center;
perspective:1200px;
touch-action:none;
}

.card{
width:100%;
max-width:340px;
height:520px;
position:relative;
transform-style:preserve-3d;
transition:transform .6s cubic-bezier(.4,0,.2,1);
}

.card.flipped{
transform:rotateY(180deg);
}

.face{
position:absolute;
inset:0;
border-radius:var(--radius);
padding:32px 24px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:20px;
backface-visibility:hidden;
}

.face.back{transform:rotateY(180deg)}

.label{
position:absolute;
top:14px;
left:18px;
font-size:12px;
opacity:.7;
}

/* Controls */

.controls{
display:flex;
justify-content:space-between;
margin-top:16px;
}

.arrow{
width:48px;
height:48px;
border-radius:50%;
background:var(--card);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:var(--t);
}

.arrow:active{transform:scale(.9)}

.progress{
text-align:center;
font-size:14px;
opacity:.7;
margin-top:8px;
}

/* Desktop Center */

@media(min-width:600px){
body{
display:flex;
justify-content:center;
align-items:center;
}
.screen{
max-width:420px;
margin:auto;
border-radius:30px;
overflow:hidden;
background:var(--bg);
}
}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash" class="screen active">
<div class="logo">Flashcards</div>
</div>

<!-- Deck Screen -->
<div id="deckScreen" class="screen">
<div class="header">Decks</div>
<div class="deck-list" id="deckList"></div>

<input id="deckTitleInput" placeholder="Deck title"/>

<div class="button" onclick="createDeck()">Create Deck</div>
</div>

<!-- Card Screen -->
<div id="cardScreen" class="screen">
<div class="header">
<span id="deckTitleDisplay"></span>
<span onclick="openEditor()">Edit</span>
</div>

<div class="card-wrapper" id="cardWrapper">
<div class="card" id="card">
<div class="face front">
<div class="label">Question</div>
<div id="questionText"></div>
</div>
<div class="face back">
<div class="label">Answer</div>
<div id="answerText"></div>
</div>
</div>
</div>

<div class="controls">
<div class="arrow" onclick="prevCard()">←</div>
<div class="arrow" onclick="rateCard(5)">✓</div>
<div class="arrow" onclick="nextCard()">→</div>
</div>

<div class="progress" id="progress"></div>
</div>

<!-- Editor Screen -->
<div id="editorScreen" class="screen">
<div class="header">Edit Cards</div>

<div id="editorList" style="flex:1; overflow-y:auto;"></div>

<textarea id="newQ" placeholder="Question"></textarea>
<textarea id="newA" placeholder="Answer"></textarea>

<div class="button" onclick="addCard()">Add Card</div>
<div class="button muted-btn" onclick="backToDeck()">Done</div>
</div>

<script>
let decks=JSON.parse(localStorage.getItem("flashDecks"))||[];
let currentDeck=null;
let currentIndex=0;
let touchStartX=0,touchStartY=0;

const splash=document.getElementById("splash");
const deckScreen=document.getElementById("deckScreen");
const cardScreen=document.getElementById("cardScreen");
const editorScreen=document.getElementById("editorScreen");
const deckList=document.getElementById("deckList");
const card=document.getElementById("card");

setTimeout(()=>{
splash.classList.remove("active");
deckScreen.classList.add("active");
},1200);

/* HAPTIC */
function haptic(){
if(navigator.vibrate) navigator.vibrate(10);
}

/* Save */
function save(){
localStorage.setItem("flashDecks",JSON.stringify(decks));
}

/* Create Deck */
function createDeck(){
const title=document.getElementById("deckTitleInput").value.trim();
if(!title) return;
decks.push({title,cards:[]});
save();
renderDecks();
document.getElementById("deckTitleInput").value="";
}

/* Render Decks */
function renderDecks(){
deckList.innerHTML="";
decks.forEach((deck,i)=>{
const d=document.createElement("div");
d.className="deck";
d.style.background="#1c1c1f";
d.innerHTML=`
<div class="deck-title">${deck.title}</div>
<div class="deck-meta">${deck.cards.length} cards</div>
`;
let pressTimer;
d.onmousedown=d.ontouchstart=()=>{
pressTimer=setTimeout(()=>{
if(confirm("Delete deck?")){
decks.splice(i,1);
save();
renderDecks();
}
},700);
};
d.onmouseup=d.ontouchend=()=>clearTimeout(pressTimer);
d.onclick=()=>openDeck(i);
deckList.appendChild(d);
});
}

/* Open Deck */
function openDeck(i){
currentDeck=decks[i];
currentIndex=0;
deckScreen.classList.remove("active");
cardScreen.classList.add("active");
document.getElementById("deckTitleDisplay").innerText=currentDeck.title;
updateCard();
}

/* Update Card */
function updateCard(){
if(!currentDeck.cards.length){
document.getElementById("questionText").innerText="No cards yet";
document.getElementById("answerText").innerText="";
return;
}
card.classList.remove("flipped");
const c=currentDeck.cards[currentIndex];
document.getElementById("questionText").innerText=c.q;
document.getElementById("answerText").innerText=c.a;
document.getElementById("progress").innerText=`${currentIndex+1} / ${currentDeck.cards.length}`;
}

/* Flip */
card.onclick=()=>{
card.classList.toggle("flipped");
haptic();
};

/* Swipe */
card.addEventListener("touchstart",e=>{
touchStartX=e.touches[0].clientX;
touchStartY=e.touches[0].clientY;
});

card.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-touchStartX;
let dy=e.changedTouches[0].clientY-touchStartY;
if(Math.abs(dx)>60){
dx<0?nextCard():prevCard();
}
if(dy>100){ // drag down dismiss
backToDeck();
}
});

/* Navigation */
function nextCard(){
if(currentIndex<currentDeck.cards.length-1){
currentIndex++;
updateCard();
haptic();
}
}

function prevCard(){
if(currentIndex>0){
currentIndex--;
updateCard();
haptic();
}
}

/* Spaced Repetition (light SM2) */
function rateCard(score){
const cardObj=currentDeck.cards[currentIndex];
cardObj.interval=cardObj.interval||1;
cardObj.ease=cardObj.ease||2.5;
cardObj.interval=Math.round(cardObj.interval*cardObj.ease);
cardObj.ease=Math.max(1.3,cardObj.ease+(.1-(5-score)*(0.08+(5-score)*0.02)));
save();
nextCard();
}

/* Editor */
function openEditor(){
cardScreen.classList.remove("active");
editorScreen.classList.add("active");
renderEditor();
}

function renderEditor(){
const list=document.getElementById("editorList");
list.innerHTML="";
currentDeck.cards.forEach((c,i)=>{
const div=document.createElement("div");
div.style.marginBottom="12px";
div.innerHTML=`<div style="opacity:.7">${i+1}. ${c.q}</div>`;
list.appendChild(div);
});
}

function addCard(){
const q=document.getElementById("newQ").value.trim();
const a=document.getElementById("newA").value.trim();
if(!q||!a) return;
currentDeck.cards.push({q,a});
document.getElementById("newQ").value="";
document.getElementById("newA").value="";
save();
renderEditor();
}

function backToDeck(){
editorScreen.classList.remove("active");
cardScreen.classList.add("active");
updateCard();
}

/* Init */
renderDecks();
</script>
</body>
</html>
